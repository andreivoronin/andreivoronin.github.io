---
layout: default
---

{% for static_file in site.static_files %}
    {% if static_file.path == '/img/design-basic/-cover2.jpg' %}
        <div>
          <img src="/img/{{ page.id }}/-cover.jpg" alt="{{ page.title | escape }}">
        </div>
    {% endif %}
{% endfor %}
  
<h1>{{ page.title }}</h1>

{{ content }}

<time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
  {{ page.date | date: "%b %-d, %Y" }}
</time>
